<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Newsletter sign-up form with success message</title>


  <link rel="stylesheet" href="style.css">
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <!-- Sign-up form start -->
   <div class="signup">
    <div class="leftSide">
      <h1>Stay updated!</h1>
      <p>Join 60,000+ product managers receiving monthly updated on:</p>
      <ul>
        <li>
          <a href="#"><img src="assets/images/icon-list.svg" alt="icon-list">Product discovery and building what matters</a>
          <a href="#"><img src="assets/images/icon-list.svg" alt="icon-list"> Measuring to ensure updates are a success</a>
          <a href="#"><img src="assets/images/icon-list.svg" alt="icon-list"> And much more!</a>
        </li>
      </ul>

      <form action="" method="post">
        <label for="email">Email address</label>
        <input type="email" name="E-mail" id="email" placeholder="email@company.com">
        <input type="submit" value="Subscribe to monthly newsletter">
      </form>
    </div>
    <div class="rightSide">
      <picture>
        <source media="(max-width: 600px)" srcset="assets/images/illustration-sign-up-mobile.svg">
        <source media="(max-width: 1024px)" srcset="assets/images/illustration-sign-up-tablet.svg">
        <img src="assets/images/illustration-sign-up-desktop.svg" alt="Sign up illustration">
      </picture>
    </div>
   </div>

  <!-- Sign-up form end -->

  <!-- Success message start -->


  <!-- Success message end -->
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
